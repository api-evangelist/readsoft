aid: readsoft
name: ReadSoft
description: >-
  ReadSoft was a provider of intelligent automation and business process
  management solutions for accounts payable and other document-intensive
  processes. Acquired by Lexmark in 2014, the technology was rolled into Kofax
  and is now part of Tungsten Automation. ReadSoft no longer publishes a public
  developer-facing REST API; its capture and AP automation products are
  delivered as installed enterprise software with partner-only integration
  resources.
